<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="popup.css" />
        <script src="../../build/popup/popup.js" type="module" defer></script>
    </head>

    <body>
        <div class="ambient"></div>
        <main>
            <header class="hero">
                <p class="eyebrow">COOKIE POSTER</p>
                <h1>Cookie Poster</h1>
                <p class="hero-copy">Ejecuta envios por dominio con un estilo visual mas claro para pruebas rapidas.</p>
            </header>

            <button id="postCookie" class="post-btn">Enviar por tab actual</button>
            <p id="status" class="status" aria-live="polite"></p>

            <section class="profiles">
                <h2>Perfiles</h2>
                <p id="emptyState" class="empty">Configura perfiles en Opciones.</p>
                <div id="profilesContainer" class="profiles-container"></div>
            </section>

            <button id="openOptions" class="link-btn" type="button">Abrir opciones</button>
        </main>
    </body>
</html>
